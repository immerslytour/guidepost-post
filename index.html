<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Guidepost Media — Publicación de hoy</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:#0A0A0A;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:32px 16px;
  }
  .card{
    width:100%; max-width:420px; background:#fff;
    border-radius:14px; padding:28px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .brand{ font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#C8102E; margin:0 0 6px; }
  h1{ font-size:20px; margin:0 0 4px; color:#1A1A1A; }
  p.sub{ font-size:14px; color:#666; margin:0 0 22px; }
  .field{ margin-bottom:16px; }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#333; }
  input[type="text"], textarea{
    width:100%; border:1px solid #D8D8D6; border-radius:8px;
    font-size:15px; padding:10px 12px; font-family:inherit; color:#1A1A1A; background:#fff;
  }
  input:focus, textarea:focus{ outline:none; border-color:#C8102E; }
  textarea{ resize:vertical; min-height:90px; }
  input[type="file"]{ width:100%; font-size:14px; padding:10px 0; }
  .preview{ margin-top:10px; border-radius:8px; overflow:hidden; max-height:200px; display:none; }
  .preview img{ width:100%; display:block; }
  button[type="submit"]{
    width:100%; background:#1A1A1A; color:#fff; border:none; border-radius:8px;
    padding:13px; font-size:15px; font-weight:600; cursor:pointer;
  }
  button[type="submit"]:disabled{ opacity:.5; cursor:not-allowed; }
  .not-found{ text-align:center; color:#666; padding:40px 0; }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="not-found" id="notFound" style="display:none;">
    <p>Enlace inválido. Contacta a Guidepost Media.</p>
  </div>

  <div id="formWrap" style="display:none;">
    <p class="brand">Guidepost Media</p>
    <h1 id="bizName">Publicación de hoy</h1>
    <p class="sub" id="todayDate"></p>

    <form name="daily-post" method="POST" action="/gracias.html" data-netlify="true" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="daily-post" />
      <input type="hidden" name="slug" id="slugField" />
      <input type="hidden" name="negocio" id="negocioField" />
      <input type="hidden" name="fb_page_id" id="fbPageField" />

      <div class="field">
        <label>Foto de hoy</label>
        <input type="file" accept="image/*" id="photoInput" name="foto" required />
        <div class="preview" id="preview"><img id="previewImg" /></div>
      </div>

      <div class="field">
        <label>¿Qué quieres anunciar?</label>
        <textarea name="descripcion" placeholder="Ej: Hoy estamos en el parque de la calle 5ta, especial de birria desde las 11am" required></textarea>
      </div>

      <button type="submit">Enviar publicación</button>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jmiuwoyowqcfdymxwiuf.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptaXV3b3lvd3FjZmR5bXh3aXVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjA2MjAsImV4cCI6MjA5Nzk5NjYyMH0.P8PFaw0yEpihbqJ-9ztyrpGJ8QmzSMlABwlGbixRjdo';

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });

async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) { showNotFound(); return; }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/clients?slug=eq.${slug}&active=eq.true&select=slug,name,fb_page_id`, {
    headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
  });

  const data = await res.json();
  if (!data || data.length === 0) { showNotFound(); return; }

  const client = data[0];
  document.getElementById('bizName').textContent = client.name;
  document.getElementById('slugField').value = client.slug;
  document.getElementById('negocioField').value = client.name;
  document.getElementById('fbPageField').value = client.fb_page_id;
  document.getElementById('formWrap').style.display = 'block';
}

function showNotFound() {
  document.getElementById('notFound').style.display = 'block';
}

const photoInput = document.getElementById('photoInput');
photoInput.addEventListener('change', () => {
  const file = photoInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
});

init();
</script>
</body>
</html>
