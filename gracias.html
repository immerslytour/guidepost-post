<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>¡Recibido! — Guidepost Media</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:#0A0A0A;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:32px 16px;
  }
  .card{
    width:100%; max-width:420px; background:#fff;
    border-radius:14px; padding:48px 24px; text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .check{
    width:56px; height:56px; border-radius:50%; background:#6B7A5E;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px; font-size:28px; color:#fff;
  }
  h2{ font-size:22px; margin:0 0 10px; color:#1A1A1A; }
  p{ color:#666; font-size:14px; line-height:1.5; margin:0 0 20px; }
  a{
    display:block; background:#1A1A1A; color:#fff; text-decoration:none;
    border-radius:8px; padding:12px; font-size:14px; font-weight:600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h2>¡Recibido!</h2>
  <p>Tu publicación queda lista para salir hoy en redes y Google Maps.</p>
  <a href="/">Enviar otra publicación</a>
</div>
</body>
</html>
